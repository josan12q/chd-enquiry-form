<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CHD Coaching Fair – Student Enquiry Form</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', sans-serif;
    background: #f0f4f8;
    color: #1a1a1a;
    min-height: 100vh;
    padding: 2rem 1rem;
  }

  .wrapper {
    max-width: 700px;
    margin: 0 auto;
    background: #fff;
    border-radius: 14px;
    overflow: hidden;
    border: 1px solid #dde3ea;
  }

  .header {
    background: #1a3a5c;
    padding: 1.6rem 1.75rem;
  }
  .header-tag {
    display: inline-block;
    background: rgba(255,255,255,0.15);
    border-radius: 6px;
    padding: 3px 10px;
    font-size: 11px;
    font-weight: 500;
    color: rgba(255,255,255,0.9);
    letter-spacing: 0.07em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .header h1 {
    font-size: 20px;
    font-weight: 500;
    color: #fff;
    margin-bottom: 4px;
  }
  .header p {
    font-size: 13px;
    color: rgba(255,255,255,0.65);
  }

  .body {
    padding: 1.5rem 1.75rem;
    display: flex;
    flex-direction: column;
    gap: 1.25rem;
  }

  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  @media (max-width: 500px) { .row2 { grid-template-columns: 1fr; } }

  label.field-label {
    display: block;
    font-size: 13px;
    color: #5a6473;
    margin-bottom: 6px;
  }
  label.field-label span { color: #c0392b; }

  input[type="text"], input[type="email"], input[type="tel"], input[type="number"], select, textarea {
    width: 100%;
    padding: 8px 12px;
    font-size: 14px;
    font-family: inherit;
    border: 0.5px solid #c5cdd7;
    border-radius: 8px;
    background: #fff;
    color: #1a1a1a;
    outline: none;
    transition: border-color 0.15s;
    appearance: none;
  }
  input:focus, select:focus, textarea:focus { border-color: #1a3a5c; }
  textarea { resize: vertical; line-height: 1.5; }

  .divider { border-top: 0.5px solid #e4e8ed; padding-top: 1.25rem; }

  .section-label { font-size: 13px; font-weight: 500; color: #1a1a1a; margin-bottom: 10px; }
  .cat-label {
    font-size: 11px; font-weight: 500;
    letter-spacing: 0.06em;
    color: #8a96a3;
    text-transform: uppercase;
    margin-bottom: 7px;
  }
  .course-group { display: flex; flex-direction: column; gap: 14px; }

  .course-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
    gap: 8px;
  }

  .course-btn {
    padding: 8px 10px;
    border: 0.5px solid #c5cdd7;
    border-radius: 8px;
    background: #fff;
    color: #1a1a1a;
    font-size: 13px;
    font-family: inherit;
    cursor: pointer;
    text-align: left;
    transition: background 0.12s, border-color 0.12s, color 0.12s;
  }
  .course-btn.selected {
    background: #1a3a5c;
    color: #fff;
    border-color: #1a3a5c;
    font-weight: 500;
  }

  .consent-row { display: flex; align-items: flex-start; gap: 10px; }
  .consent-row input[type="checkbox"] { margin-top: 3px; flex-shrink: 0; width: auto; }
  .consent-row label { font-size: 13px; color: #5a6473; line-height: 1.5; cursor: pointer; }

  .btn-row { display: flex; gap: 10px; padding-top: 0.25rem; }
  .btn-submit {
    flex: 1; padding: 10px 0;
    background: #1a3a5c; color: #fff;
    border: none; border-radius: 8px;
    font-size: 14px; font-weight: 500;
    cursor: pointer; font-family: inherit;
    transition: background 0.15s;
  }
  .btn-submit:hover { background: #14304e; }
  .btn-clear {
    padding: 10px 20px;
    background: #fff; color: #1a1a1a;
    border: 0.5px solid #c5cdd7; border-radius: 8px;
    font-size: 14px; cursor: pointer; font-family: inherit;
    transition: background 0.15s;
  }
  .btn-clear:hover { background: #f4f6f8; }

  #feedback {
    display: none;
    border-radius: 8px;
    padding: 12px 16px;
    font-size: 14px;
    text-align: center;
    line-height: 1.5;
  }
  #feedback.success { background: #eafaf2; color: #1a6b41; border: 0.5px solid #a0dbb9; }
  #feedback.warning { background: #fff8e6; color: #7a5200; border: 0.5px solid #f5cc6a; }
  #feedback.danger  { background: #fdf0f0; color: #a32d2d; border: 0.5px solid #f0a0a0; }
</style>
</head>
<body>
<div class="wrapper">

  <div class="header">
    <div class="header-tag">CHD Coaching Fair</div>
    <h1>Student Enquiry Form</h1>
    <p>Register your interest — our counsellors will guide you to the right programme.</p>
  </div>

  <div class="body">

    <div>
      <label class="field-label">Full name <span>*</span></label>
      <input type="text" id="fname" placeholder="e.g. Priya Sharma" />
    </div>

    <div class="row2">
      <div>
        <label class="field-label">Phone number <span>*</span></label>
        <input type="tel" id="phone" placeholder="+91 98765 43210" />
      </div>
      <div>
        <label class="field-label">Email address</label>
        <input type="email" id="email" placeholder="you@email.com" />
      </div>
    </div>

    <div class="row2">
      <div>
        <label class="field-label">City / location</label>
        <input type="text" id="city" placeholder="e.g. Chandigarh" />
      </div>
      <div>
        <label class="field-label">Highest qualification</label>
        <select id="qual" onchange="toggleOther('qual','qual-other-wrap')">
          <option value="">Select...</option>
          <option>Class 10 / SSLC</option>
          <option>Class 12 / HSC</option>
          <option>Bachelor's degree</option>
          <option>Master's degree</option>
          <option>Doctorate</option>
          <option>Other</option>
        </select>
        <div id="qual-other-wrap" style="display:none; margin-top:8px;">
          <input type="text" id="qual-other" placeholder="Please specify your qualification" />
        </div>
      </div>
    </div>

    <div class="divider">
      <p class="section-label">Courses of interest <span style="color:#c0392b;">*</span></p>
      <p style="font-size:12px; color:#8a96a3; margin-bottom:14px;">Select all that apply</p>

      <div class="course-grid">
          <button class="course-btn" onclick="toggle(this)">IELTS</button>
          <button class="course-btn" onclick="toggle(this)">CD IELTS</button>
          <button class="course-btn" onclick="toggle(this)">IELTS GT</button>
          <button class="course-btn" onclick="toggle(this)">PTE</button>
          <button class="course-btn" onclick="toggle(this)">PTE Core</button>
          <button class="course-btn" onclick="toggle(this)">CELPIP</button>
          <button class="course-btn" onclick="toggle(this)">TOEFL</button>
          <button class="course-btn" onclick="toggle(this)">Duolingo</button>
          <button class="course-btn" onclick="toggle(this)">French</button>
          <button class="course-btn" onclick="toggle(this)">German</button>
          <button class="course-btn" onclick="toggle(this)">Spoken English</button>
          <button class="course-btn" onclick="toggle(this)">Speaking skills</button>
          <button class="course-btn" onclick="toggle(this)">Grammar</button>
          <button class="course-btn" onclick="toggle(this)">SAT</button>
          <button class="course-btn" onclick="toggle(this)">GMAT</button>
          <button class="course-btn" onclick="toggle(this)">Interview preparation</button>
      </div>
    </div>

    <div class="divider">
      <div>
        <label class="field-label">Country preference</label>
        <select id="country" onchange="toggleOther('country','country-other-wrap')">
          <option value="">Select...</option>
          <option>Canada</option>
          <option>UK</option>
          <option>Australia</option>
          <option>USA</option>
          <option>Germany</option>
          <option>France</option>
          <option>New Zealand</option>
          <option>Ireland</option>
          <option>Other</option>
          <option>Not decided yet</option>
        </select>
        <div id="country-other-wrap" style="display:none; margin-top:8px;">
          <input type="text" id="country-other" placeholder="Please specify your country" />
        </div>
      </div>
    </div>

    <div>
      <label class="field-label">Any questions or special requirements?</label>
      <textarea id="msg" rows="3" placeholder="e.g. I need to appear for IELTS in 2 months…"></textarea>
    </div>

    <div class="consent-row">
      <input type="checkbox" id="consent" />
      <label for="consent">I agree to CHD contacting me about coaching programmes and upcoming batches.</label>
    </div>

    <div class="btn-row">
      <button class="btn-submit" onclick="submitForm()">Submit enquiry</button>
      <button class="btn-clear" onclick="resetForm()">Clear</button>
    </div>

    <div id="feedback"></div>

  </div>
</div>

<script>
function toggle(btn) {
  btn.classList.toggle('selected');
}

function toggleOther(selectId, wrapperId) {
  const sel = document.getElementById(selectId);
  const wrap = document.getElementById(wrapperId);
  wrap.style.display = sel.value === 'Other' ? 'block' : 'none';
  if (sel.value !== 'Other') {
    wrap.querySelector('input').value = '';
  }
}

function getSubmittedPhones() {
  try { return JSON.parse(localStorage.getItem('chd_submitted_phones') || '[]'); } catch(e) { return []; }
}

function savePhone(phone) {
  try {
    const phones = getSubmittedPhones();
    const normalized = phone.replace(/\s+/g, '');
    if (!phones.includes(normalized)) { phones.push(normalized); localStorage.setItem('chd_submitted_phones', JSON.stringify(phones)); }
  } catch(e) {}
}

function isDuplicate(phone) {
  const normalized = phone.replace(/\s+/g, '');
  return getSubmittedPhones().includes(normalized);
}

async function submitForm() {
  const fb = document.getElementById('feedback');
  const fname = document.getElementById('fname').value.trim();
  const phone = document.getElementById('phone').value.trim();
  const email = document.getElementById('email').value.trim();
  const city = document.getElementById('city').value.trim();
  const qual = document.getElementById('qual').value;
  const qualOther = document.getElementById('qual-other').value.trim();
  const country = document.getElementById('country').value;
  const countryOther = document.getElementById('country-other').value.trim();
  const msg = document.getElementById('msg').value.trim();
  const consent = document.getElementById('consent').checked;
  const selected = document.querySelectorAll('.course-btn.selected');

  fb.className = '';
  if (!fname || !phone) {
    fb.style.display = 'block'; fb.className = 'danger';
    fb.textContent = 'Please fill in your name and phone number.';
    return;
  }
  if (isDuplicate(phone)) {
    fb.style.display = 'block'; fb.className = 'warning';
    fb.innerHTML = '&#9888; This phone number is already registered with us. Our counsellor will be in touch shortly. For a different query, please call us directly.';
    return;
  }
  if (selected.length === 0) {
    fb.style.display = 'block'; fb.className = 'warning';
    fb.textContent = 'Please select at least one course of interest.';
    return;
  }
  if (!consent) {
    fb.style.display = 'block'; fb.className = 'danger';
    fb.textContent = 'Please agree to the consent statement before submitting.';
    return;
  }

  const courses = Array.from(selected).map(b => b.textContent).join(', ');
  const qualification = qual === 'Other' ? qualOther : qual;
  const countryFinal = country === 'Other' ? countryOther : country;
  const submittedAt = new Date().toLocaleString('en-IN', { timeZone: 'Asia/Kolkata' });

  const submitBtn = document.querySelector('.btn-submit');
  submitBtn.disabled = true;
  submitBtn.textContent = 'Submitting...';
  fb.style.display = 'block'; fb.className = 'warning';
  fb.textContent = 'Please wait, submitting your enquiry...';

  const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwp35CF5lf8uS_T6O3nnvYnCybDrZ3SqegUQQQRXaUqCU3pw8sRt1sQ9RFIRSImCA/exec';

  try {
    const formData = new FormData();
    formData.append('name', fname);
    formData.append('phone', phone);
    formData.append('email', email);
    formData.append('city', city);
    formData.append('qualification', qualification);
    formData.append('courses', courses);
    formData.append('country', countryFinal);
    formData.append('message', msg);
    formData.append('submittedAt', submittedAt);

    await fetch(SCRIPT_URL, {
      method: 'POST',
      mode: 'no-cors',
      body: formData
    });

    savePhone(phone);
    fb.className = 'success';
    fb.textContent = 'Thank you, ' + fname + '! Your enquiry for ' + courses + ' has been received. Our counsellor will contact you shortly.';
  } catch(err) {
    fb.className = 'danger';
    fb.textContent = 'Something went wrong while submitting. Please try again or contact us directly.';
  } finally {
    submitBtn.disabled = false;
    submitBtn.textContent = 'Submit enquiry';
  }
}

function resetForm() {
  ['fname','phone','email','city','qual','country','msg','qual-other','country-other'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.value = '';
  });
  document.getElementById('qual-other-wrap').style.display = 'none';
  document.getElementById('country-other-wrap').style.display = 'none';
  document.getElementById('consent').checked = false;
  document.querySelectorAll('.course-btn.selected').forEach(b => b.classList.remove('selected'));
  const fb = document.getElementById('feedback');
  fb.style.display = 'none'; fb.className = '';
}
</script>
</body>
</html>
